# ── Output / resource paths ───────────────────────────────────────────────────
outdir: "results"
human_ref: "resources/GRCh38.mmi"

# ── Sample sheet (TSV with columns: sample, long_reads) ──────────────────────
samples: "config/samples.tsv"

# ── Filtlong ──────────────────────────────────────────────────────────────────
filtlong:
  min_length: 1000       # discard reads shorter than 1 kb
  min_mean_q: 8          # discard reads with mean Phred quality < 8
  keep_percent: 95       # keep the best 95 % of bases

# ── Flye ─────────────────────────────────────────────────────────────────────
flye:
  read_type: "--nano-hq"      # use --nano-raw for older R9 data
  genome_size: "5m"           # expected genome size (e.g. 5m for a typical bacterium)
  min_overlap: 1000
  extra_args: ""              # additional Flye flags, e.g. "--meta" for metagenomes

# ── Medaka ────────────────────────────────────────────────────────────────────
medaka:
  model: "r1041_e82_400bps_hac_g632"   # adjust to your flowcell/basecaller version
  chunk_len: 800                         # consensus chunk length
  chunk_ovlp: 400                        # overlap between chunks

# ── CheckM2 ───────────────────────────────────────────────────────────────────
checkm2:
  db: "resources/checkm2_db/uniref100.KO.1.dmnd"

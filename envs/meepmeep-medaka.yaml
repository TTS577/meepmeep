name: meepmeep-medaka
channels:
  - bioconda
  - conda-forge
dependencies:
  # Long-read polishing.
  # medaka >=2.0 dropped the libcurl <8 and old libdeflate constraints
  # that made 1.11.3 unsolvable on current conda-forge.
  # The 'defaults' channel is omitted to avoid strict-priority conflicts
  # with conda-forge packages (e.g. libdeflate).
  - medaka >=2.0
  - python >=3.9,<3.12

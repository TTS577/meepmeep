name: meepmeep-medaka
channels:
  - bioconda
  - conda-forge
dependencies:
  # medaka >=2.0 uses ONNX Runtime, dropping the old tensorflow/libcurl <8
  # dependency conflicts. minimap2 + samtools are needed for the alignment
  # step that must now precede medaka inference.
  - medaka >=2.0
  - minimap2 >=2.26
  - samtools >=1.18
  - python >=3.9,<3.12

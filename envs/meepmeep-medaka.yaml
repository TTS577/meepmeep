name: meepmeep-medaka
channels:
  - bioconda
  - conda-forge
  - nodefaults
dependencies:
  - python >=3.9,<3.13
  # c-ares <2 is required because grpcio (a medaka dep) needs c-ares <2,
  # but conda-forge now ships c-ares >=2 by default.
  - c-ares <2
  # medaka >=2.0 uses ONNX Runtime, dropping the tensorflow/libcurl<8
  # dependency conflicts present in 1.x.
  - medaka >=2.0

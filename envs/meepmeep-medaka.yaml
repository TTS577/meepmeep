name: meepmeep-medaka
channels:
  - bioconda
  - conda-forge
dependencies:
  # medaka depends on grpcio, which requires c-ares <2.
  # conda-forge now ships c-ares >=2 by default, so we must pin it down.
  # Pinning c-ares <2 lets the solver pick a grpcio that satisfies medaka.
  - c-ares <2
  # Do NOT pin samtools/minimap2 explicitly: medaka pulls in its own
  # compatible htslib/libdeflate versions; independent samtools pins cause
  # libdeflate version conflicts.
  - medaka >=2.0
  - python >=3.9,<3.12
